<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
    <div id="dots"></div>
    
    <header>
        <nav>
            <a href="main.html">Home</a>
            <a href="#">Projetos</a>
        </nav>
    </header>
    <main class="animate__animated animate__fadeIn">
        <h1>Ryan Nunes</h1>
        <p>Aluno de análise e desenvolvimento de sistemas pela Estácio procurando um estágio.</p>
        <h3>Conhecimento prévio em:</h3>
        <p>Linguagem C#<br>
            Python<br>
            HTML e CSS<br>
            PostgreSQL<br>
            Git & GitHub
        </p>

        <div class="icons">
            <div id="git">
                <abbr title="GitHub">
                    <a href="https://github.com/ryanbtf" target="_blank"><img src="imgs/GitHub_Invertocat_White.png" alt="GitHub" width="30px" height="30px"></a>
                </abbr>
            </div>
            <div id="lkdn">
                <abbr title="LinkedIn">
                    <a href="https://www.linkedin.com/in/ryanbtf/" target="_blank"><img src="imgs/linkedin-blue.png" alt="LinkedIn" width="30px" height="30px"></a>
                </abbr>
            </div>
        </div>
    </main>
    <script>
        VANTA.DOTS({
        el: "#dots",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0x919e6,
        color2: 0xff2096,
        backgroundColor: 0x111111,
        size: 3.20,
        spacing: 49.00,
        showLines: false
        })
    </script>
</body>
</html>
